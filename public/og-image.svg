<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4ec"/>
      <stop offset="100%" stop-color="#ede4d0"/>
    </linearGradient>
    <radialGradient id="glow" cx="15%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#c2570f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c2570f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Eyebrow rule + label -->
  <line x1="80" y1="120" x2="140" y2="120" stroke="#c2570f" stroke-width="3"/>
  <text x="160" y="126" font-family="Georgia, serif" font-size="20" letter-spacing="6" fill="#7a6f56">THE DAILY TRIAGE</text>

  <!-- Title -->
  <text x="80" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="300" fill="#3a2f1d">Issues,</text>
  <text x="80" y="400" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="120" font-weight="300" fill="#c2570f">at a glance.</text>

  <!-- Subtitle -->
  <text x="80" y="475" font-family="Georgia, serif" font-size="26" fill="#6b6045">
    Every open thread, every closed loop — gathered into one quiet desk.
  </text>

  <!-- Footer rule + brand -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#3a2f1d" stroke-opacity="0.15" stroke-width="1"/>
  <text x="80" y="585" font-family="Georgia, serif" font-size="20" letter-spacing="4" fill="#7a6f56">GITHUB · ISSUES · VIEWER</text>
  <text x="1120" y="585" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#3a2f1d" text-anchor="end">N°&#8201;01 / Dashboard</text>

  <!-- Issue dot motif -->
  <circle cx="1050" cy="180" r="80" fill="none" stroke="#c2570f" stroke-width="6"/>
  <circle cx="1050" cy="180" r="22" fill="#c2570f"/>
</svg>
